name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Lint client
        working-directory: client
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: hankjones
          POSTGRES_DB: first_chair
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hankjones"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up database schema
        run: |
          PGHOST=localhost PGUSER=hankjones psql -d first_chair -f server/sql/schema.sql 2>&1 | grep -v "^CREATE\|^DROP\|already exists\|does not exist" || true

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Seed database
        working-directory: server
        run: node src/seed.js

      - name: Run server tests
        working-directory: server
        run: npm test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client tests
        working-directory: client
        run: npm test

      - name: Build client
        working-directory: client
        run: npx vite build
